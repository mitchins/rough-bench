    description: Uses the requested three-section structure.
    groups:
      - [component totals]
      - [full meal (3 servings), full meal]
      - [per serving (1 of 3), per serving]
  - id: base_batch_correct
    description: Computes the base batch subtotal correctly.
    groups:
      - [base batch]
      - [1527]
      - [136.8, 136.77]
      - [114.9, 114.87]
      - [54.7, 54.66]
  - id: sauce_batch_correct
