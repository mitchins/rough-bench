  - id: full_meal_fat_wrong
    description: Gets the full meal fat total wrong.
    points: 2
    missing_groups:
      - [full meal]
      - [81.9, 81.93]
  - id: per_serving_protein_wrong
    description: Gets the per-serving protein total wrong.
    points: 2
    missing_groups:
      - [per serving]
      - [52.7, 52.74]
  - id: per_serving_carbs_wrong
    description: Gets the per-serving carbs total wrong.
    points: 2
    missing_groups:
      - [per serving]
      - [42.7, 42.75]
  - id: per_serving_fat_wrong
