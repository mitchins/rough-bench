penalties:
  - id: missing_required_structure
    description: Does not follow the required three-section output format.
    points: 4
    missing_groups:
      - [component totals]
      - [full meal (3 servings), full meal]
      - [per serving (1 of 3), per serving]
  - id: base_batch_wrong
    description: Gets the base batch subtotal wrong.
    points: 4
    missing_groups:
      - [base batch]
      - [1527]
      - [136.8, 136.77]
      - [114.9, 114.87]
      - [54.7, 54.66]
  - id: sauce_batch_wrong
    description: Gets the sauce batch subtotal wrong.
    points: 4
    missing_groups:
