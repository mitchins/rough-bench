      - [280, 280.4, 280.35]
      - [16.4, 16.35]
      - [12.0, 11.97]
      - [19.5, 19.53]
  - id: fixed_topping_missing_or_wrong
    description: Omits the fixed feta topping or accounts for it incorrectly.
