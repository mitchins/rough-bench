      - [feta total]
      - [95, 95.4]
      - [5.1, 5.11]
      - [1.4]
      - [7.7, 7.74]
  - id: full_meal_calories_wrong
    description: Gets the full meal calories wrong.
    points: 5
    missing_groups:
      - [full meal]
      - [1903]
  - id: full_meal_protein_wrong
    description: Gets the full meal protein total wrong.
    points: 2
    missing_groups:
      - [full meal]
      - [158.2, 158.23]
  - id: full_meal_carbs_wrong
    description: Gets the full meal carbs total wrong.
    points: 2
