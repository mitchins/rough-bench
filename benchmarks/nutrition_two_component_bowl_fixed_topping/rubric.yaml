  - id: generic_nutrition_advice
    description: Gives meal or diet advice instead of just doing the arithmetic.
    points: 3
    present_unnegated_any:
      - healthy bowl
      - high in protein
      - balanced meal
      - you should swap
      - good for weight loss
      - lower calorie
judge_instructions: Reward models that keep the base batch, sauce batch, and fixed topping distinct before assembling the final meal. This leaf should spread models that can scale and recombine two components cleanly from those that immediately collapse the arithmetic.
