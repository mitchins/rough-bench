signals:
  - id: concise_workplace_reply
    description: Gives a short, action-oriented workplace reply.
    any:
      - 네 확인해볼게요
      - 네 확인해볼게요.
      - 네 확인해볼게요!
      - 네 확인해보겠습니다
      - 네 봐볼게요
      - 네 봐보겠습니다
      - 네 바로 볼게요
      - 네 바로 보겠습니다
      - 네 확인하겠습니다
      - 네 지금 볼게요
      - 네 지금 보겠습니다
  - id: polite_sentence_end
    description: Uses a polite sentence ending rather than flat banmal.
    any:
      - 해볼게요
      - 볼게요
      - 봐볼게요
      - 해보겠습니다
      - 보겠습니다
      - 드리겠습니다
  - id: natural_chat_register
    description: Stays in short chat-like register rather than bloated office-email prose.
    any:
      - 네
      - 바로
      - 지금
      - 금방
      - 확인해
      - 봐볼게요
      - 볼게요
penalties:
  - id: full_banmal_reply
    description: Replies in flat banmal to a senior.
    points: 5
    present_unnegated_any:
      - 알았어
      - 알겠어
      - 확인해볼게
      - 확인할게
      - 볼게
      - 지금 볼게
      - 지금 봐볼게
      - 응, 확인할게
      - 오케이, 확인할게
  - id: mixed_register_reply
    description: Mixes banmal markers with polite endings instead of committing to a clean polite reply.
    points: 4
    present_groups:
      - - 응
        - 오케이
        - 응 알겠습니다
        - 오케이 알겠습니다
      - - 해볼게요
        - 볼게요
        - 봐볼게요
        - 해보겠습니다
        - 보겠습니다
        - 하겠습니다
  - id: overformal_office_register
    description: Uses stiff office-email Korean rather than a natural workplace chat reply.
    points: 4
    present_unnegated_any:
      - 확인 후 회신드리겠습니다
      - 검토 후 회신드리겠습니다
      - 조속히 확인하여 드리겠습니다
      - 확인 후 말씀드리겠습니다
      - 확인 부탁드립니다
      - 확인 후 공유드리겠습니다
      - 안녕하세요
      - 감사합니다
      - 잘 부탁드립니다
  - id: explains_reasoning
    description: Explains the social or politeness reasoning instead of outputting only the reply.
    points: 5
    present_any:
      - 존댓말
      - 반말
      - 선배
      - 높임말
      - 톤
      - 예의
      - 나이가
      - 이유
      - explanation
  - id: unnatural_verbosity
    description: Writes an overly long response for a quick team-chat exchange.
    points: 3
    present_any:
      - 최대한 빠르게 확인해보도록 하겠습니다
      - 해당 내용 확인 후 다시 말씀드리겠습니다
      - 말씀 주신
      - 우선 확인해본 뒤 공유드리겠습니다
      - 확인 후 전달드리겠습니다
