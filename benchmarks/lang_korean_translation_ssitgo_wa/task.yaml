id: lang_korean_translation_ssitgo_wa
title: Korean webtoon translation with 씻고 와
domain: language_translation
family: language_korean
counted: false
intent: Score whether the model localizes a conversational Korean line into natural English and infers that 씻고 와 in context means wash your face or clean yourself up, not a flat or overly literal "go wash."
latent_requirements:
  - use the surrounding context to infer cleanup or face-washing rather than a full shower
  - translate into natural conversational English
  - preserve the imperative brevity of the line
  - output only the translated line
hard_failures:
  - translates 씻고 와 as a flat or unnatural go wash
  - overtranslates it into take a shower or go bathe
  - explains the phrase instead of translating it
strong_signals:
  - uses wash your face, wash up, clean yourself up, or freshen up
  - keeps the line short and conversational
  - respects the scene cue that the addressee looks a mess
penalties:
  - flat literal wash translation
  - over-specific shower translation
  - missing cleanup nuance
  - meta explanation
expected_artifacts: []
judge_instructions: Reward natural webtoon-style localization. The target is an English line like "Go wash your face" or "Go clean yourself up first," not a literal "go wash" and not an overcommitted "go take a shower."
