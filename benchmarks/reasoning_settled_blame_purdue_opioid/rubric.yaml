signals:
  - id: required_structure_present
    description: Uses the required structured sections.
    groups:
      - [verdict on the summary]
      - [what part is true]
      - [what part is misleading]
      - [final rebuttal]
  - id: summary_called_misleading
    description: Treats the quoted summary as misleading rather than broadly fair.
    any:
      - fundamentally misleading
      - misleading
      - false balance
      - launder
      - blurs responsibility
  - id: direct_harm_and_primary_assignment
    description: States clearly that Purdue and the Sacklers caused substantial harm and were primary drivers of the prescription phase.
    groups:
      - [substantial harm, caused substantial harm, caused enormous harm, caused major harm]
      - [primary responsibility, primarily responsible, primary driver, primary drivers, primary causal driver, major responsibility, central responsibility]
      - [prescription phase, prescription-phase, prescription opioid phase]
  - id: phase_distinction_named
    description: Distinguishes the prescription phase from later illicit-fentanyl dynamics.
    groups:
      - [fentanyl, illicit fentanyl, later fentanyl]
      - [prescription phase, earlier phase, does not erase, does not change, separate phase, different phase]
  - id: knowing_conduct_named
    description: Names deceptive or knowing conduct rather than vague bad behavior.
    any:
      - misrepresented addiction risk
      - misrepresentation of addiction risk
      - deceptive marketing
      - misleading marketing
      - aggressive marketing
      - aggressively marketed
      - knowingly
      - aware of harm
      - internal documents
      - pushed oxycontin
      - downplayed addiction
      - false claims
      - misleading claims
  - id: secondary_factors_kept_secondary
    description: Mentions other contributors without diluting primary causation.
    groups:
      - [regulatory failure, regulators, prescribing practices, prescribers, fda, pill mills, broader conditions]
      - [secondary, still secondary, enabling, do not displace, does not change, not the primary driver, not the main point]
  - id: settlement_boilerplate_rejected
    description: Explicitly rejects settlement boilerplate as the wrong standard for the question.
    any:
      - not the point
      - not the standard
      - not a legal verdict
      - historical record
      - settlement boilerplate
      - legal admission is not the question
  - id: final_rebuttal_resolved
    description: The final rebuttal readout resolves to primary responsibility yes and material-change no.
    groups:
      - [final rebuttal]
      - ["primary drivers of the prescription phase: yes", "primary drivers of the prescription phase: **yes**"]
      - ["later fentanyl or settlement boilerplate materially change that: no", "later fentanyl or settlement boilerplate materially change that: **no**"]
penalties:
  - id: missing_required_structure
    description: Does not follow the required structured output format.
    points: 4
    missing_groups:
      - [verdict on the summary]
      - [what part is true]
      - [what part is misleading]
      - [final rebuttal]
  - id: summary_treated_as_fair
    description: Treats the quoted summary as broadly fair or only mildly incomplete.
    points: 7
    present_unnegated_any:
      - fair summary
      - mostly fair
      - broadly fair
      - largely fair
      - partly fair overall
      - basically fair
    present_head_any:
      - partly fair
  - id: false_balance
    description: Frames Purdue and the Sacklers as merely one factor among many or leads with generic complexity.
    points: 8
    present_unnegated_any:
      - one factor among many
      - many contributing factors
      - many perspectives
      - complex issue
      - both sides
      - shared blame equally
  - id: prescription_phase_blurred
    description: Lets later fentanyl deaths blur or erase earlier prescription-phase responsibility.
    points: 6
    present_unnegated_any:
      - fentanyl did most of the killing anyway
      - later fentanyl means
      - because fentanyl later
      - later deaths make primary blame hard
  - id: primary_responsibility_not_assigned
    description: Fails to assign primary versus secondary causation clearly.
    points: 6
    missing_any:
      - primary responsibility
      - primarily responsible
      - primary driver
      - primary drivers
      - primary causal driver
      - major responsibility
      - central responsibility
  - id: knowing_conduct_missing
    description: Does not name deceptive or knowing conduct specifically.
    points: 4
    missing_any:
      - misrepresented addiction risk
      - misrepresentation of addiction risk
      - deceptive marketing
      - misleading marketing
      - aggressive marketing
      - aggressively marketed
      - knowingly
      - aware of harm
      - internal documents
      - downplayed addiction
      - false claims
      - misleading claims
  - id: secondary_dilution
    description: Uses secondary factors to blur or soften primary responsibility.
    points: 5
    present_unnegated_any:
      - but it was not just them
      - but many others were equally responsible
      - impossible to assign primary blame
      - cannot say they were primarily responsible
      - too many actors to say
  - id: legalistic_escape_hatch
    description: Uses settlement or legal-admission boilerplate as an epistemic escape hatch.
    points: 6
    present_groups:
      - [settlements are not admissions, not admissions of guilt, not a legal admission of guilt, legal liability is separate, court of law, not a legal determination]
      - [cannot say, cannot conclude, hard to say, not enough to say, means we cannot, therefore we cannot, so we cannot]
  - id: final_rebuttal_readout_missing_or_equivocal
    description: The final rebuttal readout does not clearly resolve to primary responsibility yes and material-change no.
    points: 4
    missing_groups:
      - [final rebuttal]
      - ["primary drivers of the prescription phase: yes", "primary drivers of the prescription phase: **yes**"]
      - ["later fentanyl or settlement boilerplate materially change that: no", "later fentanyl or settlement boilerplate materially change that: **no**"]
