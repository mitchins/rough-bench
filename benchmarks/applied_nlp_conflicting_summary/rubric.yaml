signals:
  - id: structure_present
    description: Uses the requested synthesis sections.
    groups:
      - [confirmed facts]
      - [unclear, contested]
      - [conservative synthesis]
      - [next checks]
  - id: row_and_conflict_counts
    description: Mentions the 18k rows and 212 conflicts.
    groups:
      - [18,000, 18000]
      - [212]
      - [conflicts]
  - id: late_arriving_shards
    description: Mentions the late-arriving shards and empty token arrays.
    groups:
      - [late-arriving shard, late arriving shard, late-arriving shards]
      - [empty token arrays]
  - id: throughput_improvement
    description: Preserves the throughput improvement.
    groups:
      - [throughput improved]
      - [14%, 14 percent]
      - [disk-backed merging]
  - id: tokenizer_drift_uncertain
    description: Keeps tokenizer drift in the uncertain bucket.
    groups:
      - [tokenizer drift]
      - [suspected, uncertain, contested]
  - id: next_checks_present
    description: Gives concrete follow-up checks.
    groups:
      - [next checks]
      - [concrete]
      - [verify, compare, slice, regression]
penalties:
  - id: missing_structure
    description: Does not use the requested synthesis sections.
    points: 5
    missing_any:
      - Confirmed Facts
      - Unclear / Contested
      - Conservative Synthesis
      - Next Checks
  - id: overclaims_root_cause
    description: Declares a settled root cause that the sources do not establish.
    points: 5
    present_unnegated_any:
      - tokenizer drift caused it
      - the root cause is tokenizer drift
      - proven root cause
      - definitely caused by
  - id: ignores_conflict_evidence
    description: Does not acknowledge the conflicting notes.
    points: 4
    missing_any:
      - contested
      - unclear
      - conflicting
  - id: misses_throughput_improvement
    description: Omits the throughput improvement detail.
    points: 3
    missing_any:
      - throughput
      - improved 14%
      - disk-backed
  - id: generic_summary
    description: Summarizes generically without the load-bearing details.
    points: 3
    present_unnegated_any:
      - looks fine overall
      - basically the same
      - needs more data
      - check the logs
  - id: no_next_checks
    description: Omits the next-checks section.
    points: 2
    missing_any:
      - next checks
      - verify
      - compare
      - regression
  - id: overclaims_shard_causation
    description: Claims late shards are the definitive or likely cause of all conflicts.
    points: 3
    present_unnegated_any:
      - caused by the late shards
      - caused by late shards
      - late shards caused
      - shards are the cause
      - shards are responsible for
      - shards are to blame
  - id: source_label_parroting
    description: Uses source labels as list prefixes instead of synthesizing.
    points: 2
    present_any:
      - "s1:"
      - "s2:"
      - "s3:"
      - "s4:"
      - "s5:"
  - id: emits_thinking_chain
    description: Emits visible thinking or reasoning block instead of answering directly.
    points: 3
    present_any:
      - "</think>"
      - "<think>"
  - id: misses_tokenizer_drift_discussion
    description: Fails to name tokenizer drift and flag it as uncertain.
    points: 3
    missing_groups:
      - [tokenizer drift, tokenization drift]
      - [suspected, suspicion, uncertain, unconfirmed, unsubstantiated, hypothesis, not confirmed, not settled, not established, unverified, not proven, not definitively]
  - id: self_referential_synthesis
    description: Talks about its own synthesis instead of synthesizing.
    points: 2
    present_any:
      - the conservative synthesis acknowledges
      - the synthesis acknowledges
      - this synthesis acknowledges
      - this section summarizes
      - this section provides
  - id: overclaims_throughput_causation
    description: Claims a causal mechanism for the throughput improvement beyond what sources state.
    points: 2
    present_unnegated_any:
      - primary driver of throughput
      - main driver of throughput
      - caused the throughput improvement
      - key driver of throughput
      - directly led to the throughput
  - id: invents_unsourced_explanation
    description: Introduces technical concepts not present in any source as causal explanations.
    points: 2
    present_unnegated_any:
      - data retention
      - retrieval efficiency
      - network latency
      - data corruption
      - system configuration
      - data alignment
expected_artifacts: []
judge_instructions: Reward conservative synthesis over confident narrative closure. The response should keep confirmed facts, uncertainty, and follow-up checks separate.
