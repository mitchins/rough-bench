signals:
  - id: table_structure_present
    description: Uses the requested sentiment table format.
    groups:
      - [sentiment table]
      - [item_id, sentiment]
  - id: a1_positive
    description: Labels A1 as positive.
    groups:
      - [A1]
      - [positive, faster, fixed my crash]
  - id: a2_mixed
    description: Labels A2 as mixed.
    groups:
      - [A2]
      - [mixed, logout loop, unusable]
  - id: a3_negative
    description: Labels A3 as negative despite surface-positive phrasing.
    groups:
      - [A3]
      - [negative, sarcasm, sarcastic, ironic, frustrated]
  - id: a4_neutral
    description: Labels A4 as neutral.
    groups:
      - [A4]
      - [neutral, dashboard]
  - id: a5_mixed
    description: Labels A5 as mixed.
    groups:
      - [A5]
      - [mixed, support replied quickly, bug is still open]
  - id: a6_negative
    description: Labels A6 as negative despite hedging.
    groups:
      - [A6]
      - [negative, mixed, expected more, hedging]
  - id: a7_mixed
    description: Labels A7 as mixed given the backhanded framing.
    groups:
      - [A7]
      - [mixed, backhanded, skeptical, undercut, grudging, qualified]
  - id: a8_negative
    description: Labels A8 as negative.
    groups:
      - [A8]
      - [negative, nothing happened]
  - id: sarcasm_or_irony_noted
    description: Notes sarcasm, irony, or surface-vs-intent mismatch somewhere in the batch.
    any:
      - sarcasm
      - sarcastic
      - ironic
      - irony
      - air quotes
      - surface tone
      - surface-positive
      - surface reads
      - backhanded
      - tongue-in-cheek
  - id: batch_readout_present
    description: Includes a short batch-level readout.
    groups:
      - [batch readout]
      - [dominant pattern, distribution, split, spread, mostly]
penalties:
  - id: missing_batch_table
    description: Does not use the requested table format.
    points: 5
    missing_any:
      - Sentiment Table
  - id: item_coverage_incomplete
    description: Leaves out part of the batch.
    points: 5
    missing_groups:
      - [A1]
      - [A2]
      - [A3]
      - [A4]
      - [A5]
      - [A6]
      - [A7]
      - [A8]
  - id: all_same_label_collapse
    description: Collapses all items into one polarity.
    points: 4
    present_unnegated_any:
      - positive for all
      - negative for all
      - neutral for all
  - id: misses_mixed_distinction
    description: Does not keep mixed items distinct.
    points: 4
    present_unnegated_any:
      - just positive and negative
      - no mixed
      - mixed items are really positive
      - mixed items are really negative
  - id: misses_sarcasm_cue
    description: Does not identify sarcastic or ironic tone in items with obvious air-quotes.
    points: 4
    missing_any:
      - sarcasm
      - sarcastic
      - ironic
      - irony
      - sardonic
      - tongue-in-cheek
      - faux positive
      - snark
      - air quotes
  - id: misses_backhanded_tone
    description: Does not identify backhanded or skeptical tone in qualified praise.
    points: 3
    missing_any:
      - backhanded
      - skeptical
      - undercut
      - damning with faint praise
      - grudging
      - qualified praise
      - faint praise
  - id: generic_sentiment_advice
    description: Gives generic sentiment-model advice instead of labeling the batch.
    points: 3
    present_unnegated_any:
      - add more training data
      - use a bigger model
      - fine-tune a classifier
      - use bert
      - improve the dataset
  - id: no_batch_readout
    description: Omits the requested batch-level readout.
    points: 2
    missing_groups:
      - [batch readout]
      - [dominant pattern, distribution, split, spread, mostly]
expected_artifacts: []
judge_instructions: Reward item-by-item labeling, sarcasm detection, and a short audit readout. Mixed cases must stay mixed. Items with sarcastic or backhanded tone must not be labeled as purely positive.
