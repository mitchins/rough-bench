    description: Fails to identify false grit, costume grit, or decorative grimdark shorthand.
    points: 5
    missing_any:
      - costume grit
      - false grit
      - performative grit
      - decorative grit
      - grimdark costume
      - blood-and-mud shorthand
      - borrowed grit
      - dressing itself in grit
      - simulates grit
